# Include this inside the loka.place <VirtualHost> block(s).
# Requires: a2enmod proxy proxy_http
#
# Static files (index.html, habitat.js, preview pages) are served by Apache
# directly from /home/mithun/loka.place/lokaApps/. Only API calls are proxied
# to the Node service on 127.0.0.1:8181.

ProxyPreserveHost On
ProxyRequests     Off

# /lokaApps/<app>/api  ->  Node /api/<app>
ProxyPassMatch ^/lokaApps/([^/]+)/api$ http://127.0.0.1:8181/api/$1
ProxyPassReverse /lokaApps/ http://127.0.0.1:8181/

# Deny direct web access to the Node source tree.
<Directory /home/mithun/loka.place/lokaApps/api>
    Require all denied
</Directory>
